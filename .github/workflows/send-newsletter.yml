name: Send Newsletter

on:
  push:
    branches:
      - main
    paths:
      - "data/stories.json"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send latest story to subscribers
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          python scripts/notify_subscribers.py --base-url https://lumorareads.online
